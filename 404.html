<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Vinayak Singh</title>
    <meta name="robots" content="noindex">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            font-family: 'Outfit', sans-serif;
            background: #060b08; color: #e0ece6;
            text-align: center; padding: 24px;
        }
        .code {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(5rem, 15vw, 10rem); font-weight: 900;
            background: linear-gradient(135deg, #34d399, #d4a017);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height: 1;
        }
        h1 { font-size: 1.5rem; margin: 16px 0 8px; font-weight: 700; }
        p { color: #7a9e8a; font-size: 1rem; margin-bottom: 32px; max-width: 400px; }
        a {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 13px 28px; border-radius: 10px;
            font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 600;
            background: linear-gradient(135deg, #34d399, #d4a017); color: #fff;
            text-decoration: none;
            box-shadow: 0 4px 24px rgba(52, 211, 153, 0.25);
            transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }
        a:hover {
            box-shadow: 0 8px 40px rgba(52, 211, 153, 0.4);
            transform: translateY(-2px);
        }
        .terminal {
            margin-top: 40px; padding: 16px 24px;
            background: rgba(10, 22, 16, 0.7);
            border: 1px solid rgba(40, 190, 100, 0.25);
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem; color: #7a9e8a;
        }
        .terminal span { color: #34d399; }
    </style>
</head>
<body>
    <div class="code">404</div>
    <h1>Route Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="/">← Back to Portfolio</a>
    <div class="terminal">
        <span>❯</span> curl -I this-page<br>
        HTTP/1.1 <span>404</span> Not Found
    </div>
</body>
</html>
